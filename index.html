<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDSYNC // 404: NO EXISTES</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#0a0a0e; }
  canvas#scene { display:block; width:100%; height:100%; }
  body.is-fullscreen, body.is-fullscreen canvas#scene { cursor:none; }
  #greenOverlay {
    position:fixed; inset:0; background:#17e06a; opacity:0;
    transition: opacity 0.55s ease;
    pointer-events:none; z-index:50;
  }
  #greenOverlay.active { opacity:1; }
  #greenOverlay.glitching { animation: overlayGlitch 0.16s linear 2; }
  @keyframes overlayGlitch {
    0%   { filter:none; transform:translate(0,0); clip-path: inset(0 0 0 0); }
    15%  { filter:hue-rotate(45deg) saturate(2.2) brightness(1.3); transform:translate(-10px,0); clip-path: inset(10% 0 60% 0); }
    30%  { filter:hue-rotate(-35deg) saturate(2) brightness(0.8); transform:translate(8px,0); clip-path: inset(55% 0 15% 0); }
    45%  { filter:hue-rotate(25deg) contrast(1.6); transform:translate(-6px,2px); clip-path: inset(30% 0 40% 0); }
    60%  { filter:hue-rotate(-20deg) contrast(1.4); transform:translate(6px,-2px); clip-path: inset(5% 0 75% 0); }
    75%  { filter:hue-rotate(15deg); transform:translate(-3px,0); clip-path: inset(70% 0 5% 0); }
    100% { filter:none; transform:translate(0,0); clip-path: inset(0 0 0 0); }
  }
  #hint {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    color:#8fe6b8; font-family:'VT323', monospace; font-size:18px;
    letter-spacing:2px; opacity:0.7; pointer-events:none;
    text-shadow:0 0 8px rgba(80,255,160,0.6);
    user-select:none;
  }
  #vignette {
    position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="vignette"></div>
<div id="greenOverlay" class="active" style="background:#ff7a1a;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

// ---------------------------------------------------------------
// SETUP
// ---------------------------------------------------------------
const canvas = document.getElementById('scene');
const greenOverlay = document.getElementById('greenOverlay');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030304);
scene.fog = new THREE.Fog(0x030304, 4, 14);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 100);

// target point = centro de la pantalla, vista de frente
const TARGET = new THREE.Vector3(0, 1.72, 0.9);
let radius = 4.3, theta = 0, phi = Math.PI/2 - 0.02; // theta: horizontal, phi: vertical

function updateCamera(){
  camera.position.x = TARGET.x + radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = TARGET.y + radius * Math.cos(phi);
  camera.position.z = TARGET.z + radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(TARGET);
}
updateCamera();

// ---------------------------------------------------------------
// LUCES
// ---------------------------------------------------------------
scene.add(new THREE.HemisphereLight(0x1a2028, 0x000000, 0.18));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.16);
keyLight.position.set(3, 6, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.left = -4;
keyLight.shadow.camera.right = 4;
keyLight.shadow.camera.top = 5;
keyLight.shadow.camera.bottom = -2;
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 12;
keyLight.shadow.bias = -0.0015;
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x2f6a80, 0.12);
rimLight.position.set(-4, 3, -3);
scene.add(rimLight);
const screenGlow = new THREE.PointLight(0x4bffa0, 3.4, 7, 2);
screenGlow.position.set(0, 1.72, 1.9);
screenGlow.castShadow = true;
screenGlow.shadow.mapSize.set(1024,1024);
screenGlow.shadow.bias = -0.002;
scene.add(screenGlow);
const glowColorGreen = new THREE.Color(0x4bffa0);
const glowColorBlue = new THREE.Color(0x2050ff);

// suelo
const floorMat = new THREE.MeshStandardMaterial({ color:0x050506, roughness:0.95, metalness:0.05 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40), floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// ---------------------------------------------------------------
// TEXTURA DE PANTALLA (canvas 2D) -- estilo CRT glitch
// ---------------------------------------------------------------
const TW = 1024, TH = 552;
const scr = document.createElement('canvas');
scr.width = TW; scr.height = TH;
const sctx = scr.getContext('2d');
const screenTexture = new THREE.CanvasTexture(scr);
screenTexture.encoding = THREE.sRGBEncoding;
screenTexture.minFilter = THREE.LinearFilter;

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawStripeBar(x,y,w,h){
  const colors = ['#ff5fd8','#39e0ff'];
  const n = 26;
  const sw = w/n;
  for(let i=0;i<n;i++){
    sctx.fillStyle = colors[i%2];
    sctx.fillRect(x+i*sw, y, sw+1, h);
  }
}

function drawGlitchTitle(text, x, y, size){
  sctx.font = `${size}px 'Press Start 2P', monospace`;
  sctx.textAlign = 'center';
  const jitter = (Math.random()<0.12) ? (Math.random()*10-5) : 0;
  sctx.fillStyle = '#39e0ff';
  sctx.fillText(text, x-4+jitter, y);
  sctx.fillStyle = '#ff5fd8';
  sctx.fillText(text, x+4+jitter, y);
  sctx.fillStyle = '#111111';
  sctx.fillText(text, x, y);
}

let cursorBlink = true;
let lastBlink = 0;
let glitchBurst = 0;

// ---- INTRO: pantalla naranja completa al cargar -> SPACE -> pantalla rosa 10s -> se revela la computadora ----
const INTRO_ORANGE = '#ff7a1a';
const INTRO_ROSE = '#ff2f8f';
let introPhase = 'orange'; // 'orange' | 'rose' | 'done'
let introTimer = null;

// ---- estado del efecto "space": 0 normal | 1 azul (interno, con mensaje) | 2..5 overlays de color ----
const colorSequence = ['#17e06a', '#8b2fe0', '#e0362f', '#e6c72f']; // verde, morada, roja, amarilla
let spaceState = 0;
let bsodMode = false;   // true en cualquier estado activo (1..5): zoom + glitch fuerte
let glitchIntensity = 1;   // multiplicador de intensidad de glitch (suaviza hacia el objetivo)
let blueAlpha = 0;         // opacidad de la pantalla azul interna (solo estado 1)
let overlaySwapTimer = null;

function drawScreen(t){
  // fondo degradado verde
  const grd = sctx.createLinearGradient(0,0,0,TH);
  grd.addColorStop(0,'#4be09a');
  grd.addColorStop(1,'#2fb877');
  sctx.fillStyle = grd;
  sctx.fillRect(0,0,TW,TH);

  // ruido sutil
  sctx.globalAlpha = 0.04;
  for(let i=0;i<40;i++){
    sctx.fillStyle = Math.random()<0.5 ? '#000000' : '#ffffff';
    sctx.fillRect(Math.random()*TW, Math.random()*TH, Math.random()*3, Math.random()*3);
  }
  sctx.globalAlpha = 1;

  // barras de color arriba y abajo
  const barH = 22;
  drawStripeBar(0,0,TW,barH);
  drawStripeBar(0,TH-barH,TW,barH);

  // caja terminal
  const termX=40, termY=55, termW=TW-80, termH=140;
  sctx.fillStyle = 'rgba(8,30,20,0.88)';
  roundRect(sctx, termX, termY, termW, termH, 6);
  sctx.fill();
  sctx.strokeStyle = '#0d3a26';
  sctx.lineWidth = 4;
  sctx.stroke();

  sctx.textAlign = 'left';
  sctx.font = "26px 'VT323', monospace";
  sctx.fillStyle = '#b6f7d4';
  const lines = [
    '> INICIANDO SISTEMA MINDSYNC...',
    '> BUSCANDO USUARIO: VALERIA_ORTEGA',
    '> REGISTRO NO ENCONTRADO',
    '> ERROR 404'
  ];
  lines.forEach((line,i)=>{
    sctx.fillText(line, termX+18, termY+34+i*28);
  });
  if(t - lastBlink > 500){ cursorBlink = !cursorBlink; lastBlink = t; }
  if(cursorBlink){
    const w = sctx.measureText(lines[3]).width;
    sctx.fillRect(termX+18+w+8, termY+34+3*28-20, 14, 22);
  }

  // titulo grande glitch
  drawGlitchTitle('404: NO', TW/2, 300, 62);
  drawGlitchTitle('EXISTES', TW/2, 372, 62);

  // subtitulo
  sctx.textAlign='center';
  sctx.font = "24px 'VT323', monospace";
  sctx.fillStyle = '#0d2a1c';
  sctx.fillText('SISTEMA DISTRIBUIDO // CAPÍTULO 6', TW/2, 415);

  // boton press start
  const pulse = 1 + Math.sin(t/300)*0.015;
  sctx.save();
  sctx.translate(TW/2, 462);
  sctx.scale(pulse,pulse);
  roundRect(sctx, -140, -28, 280, 56, 6);
  sctx.fillStyle = '#f4ecd8';
  sctx.fill();
  sctx.lineWidth = 5;
  sctx.strokeStyle = '#161616';
  sctx.stroke();
  sctx.fillStyle = '#161616';
  sctx.font = "bold 26px 'Press Start 2P', monospace";
  sctx.fillText('PRESS START', 0, 9);
  sctx.restore();

  // footer
  sctx.font = "20px 'VT323', monospace";
  sctx.fillStyle = '#123522';
  sctx.fillText('ECHO 2.0 — SÉ TU MEJOR VERSIÓN', TW/2, TH-40);

  // ---- GLITCH: slices horizontales aleatorias (mas fuerte en modo bsod) ----
  if(Math.random() < 0.05*glitchIntensity) glitchBurst = Math.round(6*glitchIntensity);
  if(glitchBurst > 0){
    glitchBurst--;
    const slices = Math.round(4*glitchIntensity);
    for(let i=0;i<slices;i++){
      const sy = Math.random()*TH;
      const sh = 4 + Math.random()*22*glitchIntensity;
      const dx = (Math.random()*60-30)*glitchIntensity;
      sctx.drawImage(scr, 0, sy, TW, sh, dx, sy, TW, sh);
    }
    // desplazamiento de canal de color extra durante el glitch fuerte
    if(glitchIntensity > 1.4){
      sctx.globalAlpha = 0.18;
      sctx.fillStyle = '#ff2fd8';
      sctx.fillRect(-6*glitchIntensity,0,TW,TH);
      sctx.fillStyle = '#2fe8ff';
      sctx.fillRect(6*glitchIntensity,0,TW,TH);
      sctx.globalAlpha = 1;
    }
  }

  // scanlines
  sctx.globalAlpha = 0.12;
  sctx.fillStyle = '#000000';
  for(let y=0;y<TH;y+=3){
    sctx.fillRect(0,y,TW,1);
  }
  sctx.globalAlpha = 1;

  // ---- PANTALLA AZUL (fundido suave encima de todo) ----
  if(blueAlpha > 0.003){
    sctx.save();
    sctx.globalAlpha = blueAlpha;
    const bgrd = sctx.createLinearGradient(0,0,0,TH);
    bgrd.addColorStop(0,'#1642c8');
    bgrd.addColorStop(1,'#0a2a9e');
    sctx.fillStyle = bgrd;
    sctx.fillRect(0,0,TW,TH);
    if(blueAlpha > 0.35){
      const textAlpha = Math.min(1, (blueAlpha-0.35)/0.5);
      sctx.globalAlpha = textAlpha;
      sctx.fillStyle = '#ffffff';
      sctx.textAlign = 'left';
      sctx.font = "90px 'VT323', monospace";
      sctx.fillText(':(', 70, 190);
      sctx.font = "26px 'VT323', monospace";
      sctx.fillText('Se ha producido un error y MINDSYNC debe reiniciarse.', 70, 260);
      sctx.fillText('Simplemente reiniciaremos por ti.', 70, 292);
      sctx.font = "20px 'VT323', monospace";
      sctx.fillText('Si quieres saber más, puedes buscar el error en:', 70, 360);
      sctx.fillText('MINDSYNC://ERROR_404_VALERIA_ORTEGA', 70, 388);
    }
    sctx.restore();
  }

  screenTexture.needsUpdate = true;
}

// ---------------------------------------------------------------
// COMPUTADORA (construida con cubos)
// ---------------------------------------------------------------
const rig = new THREE.Group();
scene.add(rig);

const shellColor = 0x3a382f;
const shellMat = new THREE.MeshStandardMaterial({ color:shellColor, roughness:0.7, metalness:0.1 });
const darkPlasticMat = new THREE.MeshStandardMaterial({ color:0x0a0a0c, roughness:0.7, metalness:0.1 });
const metalMat = new THREE.MeshStandardMaterial({ color:0x0e0e10, roughness:0.5, metalness:0.6 });

// base / soporte
const base = new THREE.Mesh(new THREE.BoxGeometry(1.7,0.16,1.3), metalMat);
base.position.set(0, 0.08, 0.2);
base.castShadow = true; base.receiveShadow = true;
rig.add(base);

const neck = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.5,0.45), metalMat);
neck.position.set(0, 0.4, 0.2);
neck.castShadow = true; neck.receiveShadow = true;
rig.add(neck);

// carcasa principal del monitor
const shellW=3.3, shellH=2.35, shellD=1.7;
const shellY = 1.72;
const shell = new THREE.Mesh(new THREE.BoxGeometry(shellW,shellH,shellD), shellMat);
shell.position.set(0, shellY, 0.9-shellD/2+shellD/2); // z centrado en 0.9 aprox front
shell.castShadow = true; shell.receiveShadow = true;
rig.add(shell);

// recalcular: colocamos la carcasa centrada de modo que su cara frontal quede en z ~ 0.05 (mundo)
shell.position.set(0, shellY, 0.05);
const shellFrontZ = shell.position.z + shellD/2;

// bisel de pantalla (recuadro oscuro)
const bezelW=2.85, bezelH=1.65, bezelD=0.12;
const bezel = new THREE.Mesh(new THREE.BoxGeometry(bezelW,bezelH,bezelD), darkPlasticMat);
bezel.position.set(0, shellY+0.03, shellFrontZ + bezelD/2 - 0.02);
bezel.castShadow = true; bezel.receiveShadow = true;
rig.add(bezel);
const bezelFrontZ = bezel.position.z + bezelD/2;

// pantalla (plano con textura)
const screenAspect = TH/TW;
const screenW = 2.55;
const screenH = screenW*screenAspect;
const screenMat = new THREE.MeshStandardMaterial({
  map: screenTexture,
  emissive: 0xffffff,
  emissiveMap: screenTexture,
  emissiveIntensity: 0.85,
  roughness:0.35,
  metalness:0.05
});
const screenMesh = new THREE.Mesh(new THREE.PlaneGeometry(screenW,screenH), screenMat);
screenMesh.position.set(0, shellY+0.03, bezelFrontZ+0.005);
rig.add(screenMesh);
TARGET.set(screenMesh.position.x, screenMesh.position.y, screenMesh.position.z);

// halo de brillo detrás/alrededor de la pantalla
const glowMat = new THREE.MeshBasicMaterial({ color:0x53ffa8, transparent:true, opacity:0.35, blending:THREE.AdditiveBlending, depthWrite:false });
const glowPlane = new THREE.Mesh(new THREE.PlaneGeometry(screenW*1.25, screenH*1.3), glowMat);
glowPlane.position.set(0, shellY+0.03, bezelFrontZ-0.01);
rig.add(glowPlane);

// botones bajo la pantalla
const btnColors = [0xe0533f, 0xf4ecd8, 0xf4ecd8, 0xe0533f];
for(let i=0;i<4;i++){
  const btn = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.05), new THREE.MeshStandardMaterial({color:btnColors[i], roughness:0.5}));
  btn.position.set(-0.5+i*0.34, shellY - bezelH/2 - 0.15, bezelFrontZ+0.02);
  btn.castShadow = true;
  rig.add(btn);
}

// rejillas laterales (detalles de cubos pequeños)
for(let s=-1; s<=1; s+=2){
  for(let i=0;i<6;i++){
    const vent = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.14,0.5), darkPlasticMat);
    vent.position.set(s*(shellW/2-0.06), shellY+0.6-i*0.2, shell.position.z);
    vent.castShadow = true;
    rig.add(vent);
  }
}

// parte trasera abultada (tubo CRT) construida con cubos decrecientes
let cursorZ = shell.position.z - shellD/2;
const backSegments = [
  {w:2.6, h:1.9, d:0.55},
  {w:1.95,h:1.45,d:0.5},
  {w:1.25,h:0.95,d:0.4},
  {w:0.6, h:0.5, d:0.3},
];
backSegments.forEach(seg=>{
  cursorZ -= seg.d/2;
  const box = new THREE.Mesh(new THREE.BoxGeometry(seg.w,seg.h,seg.d), shellMat);
  box.position.set(0, shellY, cursorZ);
  box.castShadow = true; box.receiveShadow = true;
  rig.add(box);
  cursorZ -= seg.d/2;
});

// teclado (placa + teclas hechas de cubos)
const kbBase = new THREE.Mesh(new THREE.BoxGeometry(2.5,0.12,0.95), new THREE.MeshStandardMaterial({color:0x2c2a24, roughness:0.7}));
kbBase.position.set(0, 0.06, 1.85);
kbBase.castShadow = true; kbBase.receiveShadow = true;
rig.add(kbBase);

const keyMat = new THREE.MeshStandardMaterial({color:0x3e3b32, roughness:0.55});
const keyMatDark = new THREE.MeshStandardMaterial({color:0x141414, roughness:0.55});
const rows=4, cols=14;
for(let r=0;r<rows;r++){
  for(let c=0;c<cols;c++){
    const key = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.07,0.15), (Math.random()<0.08)?keyMatDark:keyMat);
    key.position.set(-1.15+c*0.175, 0.14, 1.55+r*0.19);
    key.castShadow = true; key.receiveShadow = true;
    rig.add(key);
  }
}

// ---------------------------------------------------------------
// INTERACCION: arrastrar para orbitar (vista de frente por defecto)
// ---------------------------------------------------------------
let dragging=false, lastX=0, lastY=0;
canvas.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('pointerup', ()=> dragging=false);
window.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const dx = e.clientX-lastX, dy = e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  theta -= dx*0.004;
  phi   -= dy*0.003;
  theta = Math.max(-0.7, Math.min(0.7, theta));
  phi = Math.max(1.15, Math.min(1.75, phi));
});

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// pantalla completa con la tecla "F" + ocultar cursor
window.addEventListener('keydown', e=>{
  if(e.key.toLowerCase() === 'f'){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen();
    }
  }
  if(e.code === 'Space'){
    e.preventDefault();

    // ---- FASE DE INTRO: naranja -> rosa (10s) -> revela la computadora ----
    if(introPhase === 'orange'){
      introPhase = 'rose';
      greenOverlay.classList.remove('glitching');
      void greenOverlay.offsetWidth;
      greenOverlay.classList.add('glitching');
      clearTimeout(overlaySwapTimer);
      overlaySwapTimer = setTimeout(()=>{
        greenOverlay.style.background = INTRO_ROSE;
      }, 90);

      clearTimeout(introTimer);
      introTimer = setTimeout(()=>{
        introPhase = 'done';
        spaceState = 0;
        bsodMode = false;
        // glitch justo antes de revelar, para que no sea un fundido plano
        greenOverlay.classList.remove('glitching');
        void greenOverlay.offsetWidth;
        greenOverlay.classList.add('glitching');
        setTimeout(()=>{
          greenOverlay.classList.remove('active'); // se desvanece y revela la computadora
        }, 90);
      }, 1500);
      return;
    }
    if(introPhase === 'rose'){
      // esperando los 10s de la pantalla rosa: ignora space por ahora
      return;
    }

    // ---- CICLO NORMAL (una vez terminada la intro) ----
    spaceState = (spaceState + 1) % (colorSequence.length + 2); // 0..5
    bsodMode = (spaceState !== 0);
    clearTimeout(overlaySwapTimer);

    if(spaceState === 0 || spaceState === 1){
      // volviendo a normal o entrando al estado azul: se revela la computadora
      greenOverlay.classList.remove('active');
    } else {
      const alreadyOpaque = greenOverlay.classList.contains('active');
      if(alreadyOpaque){
        // glitch arranca YA, en el instante de presionar space, sobre el color actual
        greenOverlay.classList.remove('glitching');
        void greenOverlay.offsetWidth; // fuerza reinicio de la animación
        greenOverlay.classList.add('glitching');
        // el color nuevo aparece a mitad del glitch, no antes
        const nextColor = colorSequence[spaceState-2];
        overlaySwapTimer = setTimeout(()=>{
          greenOverlay.style.background = nextColor;
        }, 90);
      } else {
        // primera vez que entra a las pantallas de color: breve glitch de revelación
        overlaySwapTimer = setTimeout(()=>{
          greenOverlay.style.background = colorSequence[spaceState-2];
          greenOverlay.classList.add('active');
        }, 260);
      }
    }
  }
});
document.addEventListener('fullscreenchange', ()=>{
  document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
});

// ---------------------------------------------------------------
// LOOP
// ---------------------------------------------------------------
function animate(t){
  requestAnimationFrame(animate);

  // objetivos segun el estado activado con SPACE
  const targetRadius = bsodMode ? 1.85 : 4.3;
  const targetGlitch  = bsodMode ? 2.6  : 1.0;
  const targetBlue    = (spaceState === 1) ? 1.0 : 0.0; // solo el primer estado (azul) usa el wash+mensaje interno

  radius          += (targetRadius - radius) * 0.045;
  glitchIntensity  += (targetGlitch - glitchIntensity) * 0.06;
  blueAlpha        += (targetBlue - blueAlpha) * 0.025;

  drawScreen(t);
  screenGlow.intensity = (2.0 + Math.sin(t/250)*0.3) * (1 + blueAlpha*0.6);
  screenGlow.color.copy(glowColorGreen).lerp(glowColorBlue, blueAlpha);
  glowMat.color.copy(glowColorGreen).lerp(glowColorBlue, blueAlpha);
  glowMat.opacity = (0.28 + Math.sin(t/250)*0.08) * (1 - blueAlpha*0.3);
  // leve deriva automatica si no se arrastra
  if(!dragging){ theta += Math.sin(t/6000)*0.00015; }
  updateCamera();
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

})();
</script>
</body>
</html>
